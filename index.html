<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fuby Content Planner</title>
  <meta name="description" content="Social media content planner for creators" />
  <meta name="theme-color" content="#0a0a0a" id="themeColorMeta" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ── DARK THEME (default) ── */
    :root, [data-theme="dark"] {
      --bg: #0a0a0a;
      --surface: #141414;
      --surface2: #1e1e1e;
      --border: #2a2a2a;
      --accent: #c8f04a;
      --text: #f5f5f0;
      --muted: #6b6b6b;
      --attract: #c8f04a;
      --educate: #4af0c8;
      --transform: #f04ac8;
      --convert: #f0a84a;
      --shadow: rgba(0,0,0,0.4);
      --fab-shadow: rgba(200,240,74,0.35);
      --tab-active-text: #0a0a0a;
    }

    /* ── LIGHT THEME ── */
    [data-theme="light"] {
      --bg: #f7f7f2;
      --surface: #ffffff;
      --surface2: #f0f0eb;
      --border: #e0e0d8;
      --accent: #7ab800;
      --text: #111111;
      --muted: #999990;
      --attract: #6ba300;
      --educate: #008a6b;
      --transform: #b0008a;
      --convert: #b07000;
      --shadow: rgba(0,0,0,0.08);
      --fab-shadow: rgba(100,160,0,0.3);
      --tab-active-text: #ffffff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
      transition: background 0.3s, color 0.3s;
    }

    /* ── HEADER ── */
    header {
      padding: 20px 20px 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .brand {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    /* ── THEME TOGGLE ── */
    .theme-toggle {
      width: 52px;
      height: 28px;
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 100px;
      cursor: pointer;
      position: relative;
      transition: background 0.3s, border-color 0.3s;
      flex-shrink: 0;
    }

    .theme-toggle::after {
      content: '';
      position: absolute;
      top: 3px;
      left: 3px;
      width: 20px;
      height: 20px;
      background: var(--accent);
      border-radius: 50%;
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    [data-theme="light"] .theme-toggle::after {
      transform: translateX(24px);
    }

    .theme-icon {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      font-size: 10px;
      pointer-events: none;
    }

    .theme-icon.moon { left: 6px; }
    .theme-icon.sun  { right: 5px; }

    .week-label {
      font-size: 11px;
      color: var(--muted);
      text-align: right;
      line-height: 1.6;
    }

    .week-label strong {
      color: var(--accent);
      display: block;
      font-size: 13px;
    }

    /* ── HERO ── */
    .hero { padding: 20px 20px 16px; }

    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(30px, 8vw, 46px);
      font-weight: 900;
      line-height: 1.05;
      letter-spacing: -0.02em;
    }

    .hero h1 span { color: var(--accent); }

    .hero p {
      margin-top: 6px;
      font-size: 13px;
      color: var(--muted);
      font-weight: 300;
    }

    /* ── STATS BAR ── */
    .stats-bar {
      display: flex;
      gap: 8px;
      padding: 0 20px;
      margin-bottom: 20px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .stats-bar::-webkit-scrollbar { display: none; }

    .stat-pill {
      flex-shrink: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 8px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      transition: background 0.3s, border-color 0.3s;
    }

    .stat-pill .dot { width: 7px; height: 7px; border-radius: 50%; }
    .stat-pill .count { font-weight: 600; font-size: 14px; color: var(--text); }
    .stat-pill .label { color: var(--muted); }

    /* ── FILTER TABS ── */
    .tabs {
      display: flex;
      gap: 6px;
      padding: 0 20px;
      margin-bottom: 16px;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }

    .tab {
      flex-shrink: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 12px;
      font-weight: 500;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'DM Sans', sans-serif;
    }

    .tab.active {
      background: var(--accent);
      border-color: var(--accent);
      color: var(--tab-active-text);
    }

    /* ── WEEKLY PROGRESS ── */
    .weekly-progress {
      margin: 0 20px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      transition: background 0.3s, border-color 0.3s;
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .progress-header-left { display: flex; align-items: center; gap: 10px; }

    .progress-header span {
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .pct { color: var(--accent) !important; font-size: 14px !important; letter-spacing: 0 !important; text-transform: none !important; }

    /* ── RESET BUTTON ── */
    .reset-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 5px 11px;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      transition: all 0.2s;
    }

    .reset-btn:hover { border-color: #ff5555; color: #ff5555; }
    .reset-btn:active { opacity: 0.7; transform: scale(0.96); }

    .progress-goals { display: flex; flex-direction: column; gap: 8px; }

    .goal-row { display: flex; justify-content: space-between; align-items: center; font-size: 12px; }
    .goal-row .g-label { color: var(--muted); }
    .goal-row .g-track { display: flex; align-items: center; gap: 8px; }

    .mini-bar { width: 80px; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
    .mini-bar-fill { height: 100%; border-radius: 2px; background: var(--accent); transition: width 0.4s ease; }
    .g-num { font-weight: 600; font-size: 11px; color: var(--text); min-width: 30px; text-align: right; }

    /* ── POST CARDS ── */
    .posts { padding: 0 20px; display: flex; flex-direction: column; gap: 12px; }

    .post-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      overflow: hidden;
      transition: transform 0.15s, background 0.3s, border-color 0.3s;
      animation: slideIn 0.3s ease both;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .post-card:active { transform: scale(0.98); }

    .post-top { padding: 14px 16px 10px; display: flex; justify-content: space-between; align-items: flex-start; }

    .post-type-badge {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 4px 10px;
      border-radius: 6px;
    }

    .type-attract   { background: #c8f04a20; color: var(--attract); }
    .type-educate   { background: #4af0c820; color: var(--educate); }
    .type-transform { background: #f04ac820; color: var(--transform); }
    .type-convert   { background: #f0a84a20; color: var(--convert); }

    .post-platform { font-size: 18px; }

    .post-title { padding: 0 16px; font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 700; line-height: 1.3; color: var(--text); }
    .post-caption { padding: 8px 16px; font-size: 12px; color: var(--muted); line-height: 1.5; }

    .post-bottom { padding: 10px 16px 14px; display: flex; justify-content: space-between; align-items: center; }

    .post-meta { display: flex; align-items: center; gap: 10px; font-size: 11px; color: var(--muted); }
    .post-day { background: var(--surface2); border-radius: 6px; padding: 3px 8px; font-weight: 500; }
    .post-status { display: flex; gap: 6px; }

    .status-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 5px 10px;
      font-size: 11px;
      color: var(--muted);
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.2s;
    }

    .status-btn.done { background: #c8f04a20; border-color: var(--accent); color: var(--accent); }
    .status-btn:active { opacity: 0.7; }

    /* ── FAB ── */
    .add-fab {
      position: fixed;
      bottom: 24px;
      right: 20px;
      width: 56px;
      height: 56px;
      background: var(--accent);
      border-radius: 16px;
      border: none;
      font-size: 24px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 24px var(--fab-shadow);
      transition: transform 0.15s, box-shadow 0.15s;
      z-index: 100;
      color: #0a0a0a;
    }

    .add-fab:active { transform: scale(0.92); }

    /* ── ADD POST MODAL ── */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      backdrop-filter: blur(8px);
      z-index: 200;
      display: flex;
      align-items: flex-end;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }

    .modal-overlay.open { opacity: 1; pointer-events: all; }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 24px 24px 0 0;
      padding: 24px 20px 40px;
      width: 100%;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.32, 0.72, 0, 1);
    }

    .modal-overlay.open .modal { transform: translateY(0); }

    .modal-handle { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 20px; }

    .modal h2 { font-family: 'Playfair Display', serif; font-size: 22px; margin-bottom: 20px; }

    .form-group { margin-bottom: 14px; }

    .form-group label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 14px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border-color 0.2s, background 0.3s;
    }

    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus { border-color: var(--accent); }

    .form-group select option { background: var(--surface); color: var(--text); }

    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    .submit-btn {
      width: 100%;
      background: var(--accent);
      border: none;
      border-radius: 12px;
      padding: 16px;
      font-size: 15px;
      font-weight: 600;
      color: #0a0a0a;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      margin-top: 8px;
      transition: opacity 0.2s;
    }

    .submit-btn:active { opacity: 0.85; }

    /* ── RESET CONFIRM MODAL ── */
    .confirm-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.82);
      backdrop-filter: blur(12px);
      z-index: 300;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.2s;
    }

    .confirm-overlay.open { opacity: 1; pointer-events: all; }

    .confirm-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px 24px;
      width: 100%;
      max-width: 320px;
      text-align: center;
      transform: scale(0.88);
      transition: transform 0.28s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .confirm-overlay.open .confirm-box { transform: scale(1); }

    .confirm-icon { font-size: 42px; margin-bottom: 12px; }

    .confirm-box h3 { font-family: 'Playfair Display', serif; font-size: 20px; margin-bottom: 8px; }

    .confirm-box p { font-size: 13px; color: var(--muted); line-height: 1.5; margin-bottom: 24px; }

    .confirm-actions { display: flex; gap: 10px; }

    .confirm-cancel {
      flex: 1;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 13px;
      font-size: 14px;
      font-weight: 600;
      color: var(--muted);
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: opacity 0.2s;
    }

    .confirm-delete {
      flex: 1;
      background: #ff3333;
      border: none;
      border-radius: 10px;
      padding: 13px;
      font-size: 14px;
      font-weight: 600;
      color: #fff;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: opacity 0.2s;
    }

    .confirm-cancel:active, .confirm-delete:active { opacity: 0.75; }

    /* ── INSTALL BANNER ── */
    .install-banner {
      margin: 0 20px 16px;
      background: linear-gradient(135deg, #c8f04a12, #f0a84a0e);
      border: 1px solid #c8f04a28;
      border-radius: 14px;
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .install-banner p { font-size: 12px; color: var(--muted); line-height: 1.4; }
    .install-banner strong { color: var(--text); display: block; font-size: 13px; margin-bottom: 2px; }

    .install-btn {
      background: var(--accent);
      border: none;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 12px;
      font-weight: 600;
      color: #0a0a0a;
      cursor: pointer;
      white-space: nowrap;
      font-family: 'DM Sans', sans-serif;
      flex-shrink: 0;
      margin-left: 12px;
    }

    /* ── EMPTY / TOAST ── */
    .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
    .empty .icon { font-size: 48px; margin-bottom: 12px; }
    .empty p { font-size: 14px; line-height: 1.6; }

    .bottom-space { height: 100px; }
    .hidden { display: none !important; }

    .toast {
      position: fixed;
      bottom: 90px;
      left: 50%;
      transform: translateX(-50%) translateY(16px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 10px 20px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      box-shadow: 0 8px 24px var(--shadow);
      opacity: 0;
      transition: opacity 0.22s, transform 0.22s;
      z-index: 500;
      white-space: nowrap;
      pointer-events: none;
    }

    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

  <header>
    <div class="brand">Fuby</div>
    <div class="header-right">
      <button class="theme-toggle" id="themeToggle" title="Toggle theme" aria-label="Toggle theme">
        <span class="theme-icon moon">🌙</span>
        <span class="theme-icon sun">☀️</span>
      </button>
      <div class="week-label">
        <strong>Week <span id="weekNum">1</span></strong>
        <span id="dateRange">Loading…</span>
      </div>
    </div>
  </header>

  <div class="hero">
    <h1>Content<br /><span>Planner.</span></h1>
    <p>Every post has a goal, a message, and an action.</p>
  </div>

  <div class="install-banner hidden" id="installBanner">
    <div>
      <strong>📲 Add to Home Screen</strong>
      <p>Install for offline access &amp; quick launch</p>
    </div>
    <button class="install-btn" id="installBtn">Install</button>
  </div>

  <div class="stats-bar" id="statsBar"></div>

  <div class="weekly-progress">
    <div class="progress-header">
      <div class="progress-header-left">
        <span>Weekly Goals</span>
        <span class="pct" id="overallPct">0%</span>
      </div>
      <button class="reset-btn" id="resetBtn">↺ Reset Week</button>
    </div>
    <div class="progress-goals" id="progressGoals"></div>
  </div>

  <div class="tabs" id="tabs"></div>

  <div class="posts" id="posts"></div>

  <div class="bottom-space"></div>

  <button class="add-fab" id="addFab" aria-label="Add post">＋</button>

  <!-- ADD POST MODAL -->
  <div class="modal-overlay" id="modalOverlay" role="dialog" aria-modal="true">
    <div class="modal">
      <div class="modal-handle"></div>
      <h2>New Post Idea</h2>
      <div class="form-group">
        <label>Post Title / Hook</label>
        <input type="text" id="titleInput" placeholder="e.g. 3 things nobody tells you about…" />
      </div>
      <div class="form-group">
        <label>Caption / Notes</label>
        <textarea id="captionInput" rows="2" placeholder="Key message or CTA…"></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Content Type</label>
          <select id="typeInput">
            <option value="Attract">🌱 Attract</option>
            <option value="Educate">📚 Educate</option>
            <option value="Transform">✨ Transform</option>
            <option value="Convert">💰 Convert</option>
          </select>
        </div>
        <div class="form-group">
          <label>Format</label>
          <select id="formatInput">
            <option value="Post">🖼 Post</option>
            <option value="Reel">🎬 Reel</option>
            <option value="Story">⭕ Story</option>
            <option value="Flyer">🗞 Flyer</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Platform</label>
          <select id="platformInput">
            <option value="📸">📸 Instagram</option>
            <option value="📘">📘 Facebook</option>
            <option value="🎵">🎵 TikTok</option>
            <option value="🐦">🐦 Twitter/X</option>
          </select>
        </div>
        <div class="form-group">
          <label>Day</label>
          <select id="dayInput">
            <option>Monday</option><option>Tuesday</option><option>Wednesday</option>
            <option>Thursday</option><option>Friday</option><option>Saturday</option><option>Sunday</option>
          </select>
        </div>
      </div>
      <button class="submit-btn" id="submitBtn">Add to Planner →</button>
    </div>
  </div>

  <!-- RESET CONFIRM MODAL -->
  <div class="confirm-overlay" id="confirmOverlay" role="dialog" aria-modal="true">
    <div class="confirm-box">
      <div class="confirm-icon">🗓️</div>
      <h3>Reset This Week?</h3>
      <p>All posts will be cleared and your weekly progress reset to zero. This cannot be undone.</p>
      <div class="confirm-actions">
        <button class="confirm-cancel" id="confirmCancel">Cancel</button>
        <button class="confirm-delete" id="confirmReset">Reset</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    // ── KEYS ──
    const STORAGE_KEY = 'fuby_posts_v1';
    const THEME_KEY   = 'fuby_theme_v1';

    // ── STATE ──
    let posts        = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    let activeFilter = 'All';
    let deferredPrompt = null;

    const TYPES       = ['All', 'Attract', 'Educate', 'Transform', 'Convert'];
    const TYPE_COLORS = { Attract: 'attract', Educate: 'educate', Transform: 'transform', Convert: 'convert' };

    const WEEKLY_GOALS = [
      { label: 'Posts',   key: 'Post',  target: 5 },
      { label: 'Reels',   key: 'Reel',  target: 3 },
      { label: 'Stories', key: 'Story', target: 7 },
      { label: 'Flyers',  key: 'Flyer', target: 1 },
    ];

    // ── HELPERS ──
    function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(posts)); }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2600);
    }

    // ── THEME ──
    const html = document.documentElement;
    let currentTheme = localStorage.getItem(THEME_KEY) || 'dark';

    function applyTheme(theme) {
      html.setAttribute('data-theme', theme);
      document.getElementById('themeColorMeta').content = theme === 'dark' ? '#0a0a0a' : '#f7f7f2';
      localStorage.setItem(THEME_KEY, theme);
      currentTheme = theme;
    }

    applyTheme(currentTheme);

    document.getElementById('themeToggle').addEventListener('click', () => {
      applyTheme(currentTheme === 'dark' ? 'light' : 'dark');
    });

    // ── WEEK INFO ──
    function getWeekInfo() {
      const now = new Date();
      const day = now.getDay();
      const mon = new Date(now); mon.setDate(now.getDate() - ((day + 6) % 7));
      const sun = new Date(mon); sun.setDate(mon.getDate() + 6);
      const fmt = d => d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
      const startOfYear = new Date(now.getFullYear(), 0, 1);
      const weekNum = Math.ceil(((now - startOfYear) / 86400000 + startOfYear.getDay() + 1) / 7);
      return { range: `${fmt(mon)} – ${fmt(sun)}`, weekNum };
    }

    // ── STATS ──
    function renderStats() {
      const items = [
        { dot: '#c8f04a', count: posts.length,                              label: 'Total'   },
        { dot: '#4af0c8', count: posts.filter(p => p.done).length,          label: 'Done'    },
        { dot: '#f04ac8', count: posts.filter(p => p.format==='Reel').length, label: 'Reels'   },
        { dot: '#f0a84a', count: posts.filter(p => p.format==='Story').length, label: 'Stories' },
      ];
      document.getElementById('statsBar').innerHTML = items.map(i => `
        <div class="stat-pill">
          <div class="dot" style="background:${i.dot}"></div>
          <span class="count">${i.count}</span>
          <span class="label">${i.label}</span>
        </div>`).join('');
    }

    // ── PROGRESS ──
    function renderProgress() {
      const done = posts.filter(p => p.done);
      let totalGoal = 0, totalDone = 0;
      document.getElementById('progressGoals').innerHTML = WEEKLY_GOALS.map(g => {
        const count = done.filter(p => p.format === g.key).length;
        const pct   = Math.min(100, Math.round((count / g.target) * 100));
        totalGoal += g.target;
        totalDone += Math.min(count, g.target);
        return `<div class="goal-row">
          <span class="g-label">${g.label}</span>
          <div class="g-track">
            <div class="mini-bar"><div class="mini-bar-fill" style="width:${pct}%"></div></div>
            <span class="g-num">${count}/${g.target}</span>
          </div>
        </div>`;
      }).join('');
      document.getElementById('overallPct').textContent = `${Math.round((totalDone/totalGoal)*100)}%`;
    }

    // ── TABS ──
    function renderTabs() {
      document.getElementById('tabs').innerHTML = TYPES.map(t => {
        const count = t === 'All' ? posts.length : posts.filter(p => p.type === t).length;
        return `<button class="tab ${activeFilter===t?'active':''}" data-type="${t}">${t}${count>0?` <span style="opacity:.6">(${count})</span>`:''}</button>`;
      }).join('');
      document.querySelectorAll('.tab').forEach(btn =>
        btn.addEventListener('click', () => { activeFilter = btn.dataset.type; renderTabs(); renderPosts(); })
      );
    }

    // ── POSTS ──
    function renderPosts() {
      const filtered  = activeFilter === 'All' ? posts : posts.filter(p => p.type === activeFilter);
      const container = document.getElementById('posts');
      if (filtered.length === 0) {
        container.innerHTML = `<div class="empty"><div class="icon">✦</div><p>No posts here yet.<br/>Tap + to add your first idea.</p></div>`;
        return;
      }
      container.innerHTML = filtered.map((p, i) => `
        <div class="post-card" style="animation-delay:${i*.05}s">
          <div class="post-top">
            <span class="post-type-badge type-${TYPE_COLORS[p.type]}">${p.type}</span>
            <span class="post-platform">${p.platform}</span>
          </div>
          <div class="post-title">${p.title}</div>
          ${p.caption ? `<div class="post-caption">${p.caption}</div>` : ''}
          <div class="post-bottom">
            <div class="post-meta">
              <span class="post-day">${p.day}</span>
              <span>${p.format}</span>
            </div>
            <div class="post-status">
              <button class="status-btn ${p.done?'done':''}" data-id="${p.id}">${p.done?'✓ Done':'Mark done'}</button>
              <button class="status-btn" data-del="${p.id}" style="color:#ff5555;border-color:#ff555530">✕</button>
            </div>
          </div>
        </div>`).join('');

      document.querySelectorAll('.status-btn[data-id]').forEach(btn =>
        btn.addEventListener('click', () => {
          const p = posts.find(x => x.id == btn.dataset.id);
          if (p) { p.done = !p.done; save(); renderAll(); }
        })
      );
      document.querySelectorAll('.status-btn[data-del]').forEach(btn =>
        btn.addEventListener('click', () => {
          posts = posts.filter(x => x.id != btn.dataset.del);
          save(); renderAll();
        })
      );
    }

    function renderAll() { renderStats(); renderProgress(); renderTabs(); renderPosts(); }

    // ── ADD POST MODAL ──
    const overlay = document.getElementById('modalOverlay');
    document.getElementById('addFab').addEventListener('click', () => overlay.classList.add('open'));
    overlay.addEventListener('click', e => { if (e.target === overlay) overlay.classList.remove('open'); });

    document.getElementById('submitBtn').addEventListener('click', () => {
      const titleEl = document.getElementById('titleInput');
      const title   = titleEl.value.trim();
      if (!title) { titleEl.style.borderColor = '#ff5555'; return; }
      posts.unshift({
        id:       Date.now(),
        title,
        caption:  document.getElementById('captionInput').value.trim(),
        type:     document.getElementById('typeInput').value,
        format:   document.getElementById('formatInput').value,
        platform: document.getElementById('platformInput').value,
        day:      document.getElementById('dayInput').value,
        done:     false,
      });
      save();
      overlay.classList.remove('open');
      titleEl.value = '';
      document.getElementById('captionInput').value = '';
      titleEl.style.borderColor = '';
      renderAll();
      showToast('✦ Post added to planner');
    });

    // ── WEEKLY RESET ──
    const confirmOverlay = document.getElementById('confirmOverlay');
    document.getElementById('resetBtn').addEventListener('click', () => confirmOverlay.classList.add('open'));
    document.getElementById('confirmCancel').addEventListener('click', () => confirmOverlay.classList.remove('open'));
    confirmOverlay.addEventListener('click', e => { if (e.target === confirmOverlay) confirmOverlay.classList.remove('open'); });

    document.getElementById('confirmReset').addEventListener('click', () => {
      posts = [];
      save();
      confirmOverlay.classList.remove('open');
      activeFilter = 'All';
      renderAll();
      showToast('🗓️ Week reset — fresh start!');
    });

    // ── PWA INSTALL ──
    window.addEventListener('beforeinstallprompt', e => {
      e.preventDefault();
      deferredPrompt = e;
      document.getElementById('installBanner').classList.remove('hidden');
    });
    document.getElementById('installBtn').addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null;
      document.getElementById('installBanner').classList.add('hidden');
    });
    window.addEventListener('appinstalled', () => document.getElementById('installBanner').classList.add('hidden'));

    // ── INIT ──
    const { range, weekNum } = getWeekInfo();
    document.getElementById('dateRange').textContent = range;
    document.getElementById('weekNum').textContent   = weekNum;

    if (posts.length === 0) {
      posts = [
        { id: 1, title: "Why AI product photos look more premium than real ones", caption: "Hook with a bold claim + proof", type: "Attract", format: "Post", platform: "📸", day: "Monday", done: false },
        { id: 2, title: "3 ways small businesses use AI to look bigger", caption: "Educate + subtle Fuby mention at end", type: "Educate", format: "Reel", platform: "📘", day: "Wednesday", done: false },
        { id: 3, title: "From blurry phone photo to luxury brand visual", caption: "Before/after transformation — visual proof", type: "Transform", format: "Post", platform: "📸", day: "Thursday", done: false },
        { id: 4, title: "Book your AI photoshoot — 3 spots left this week", caption: "Clear CTA with scarcity", type: "Convert", format: "Flyer", platform: "📘", day: "Friday", done: false },
      ];
      save();
    }

    renderAll();

    if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});
  </script>
</body>
</html>
